name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Siapkan Lingkungan & Ikon
        run: |
          # 1. Inisialisasi npm
          npm init -y
          
          # 2. Install Capacitor dan Alat Pembuat Ikon (Capacitor Assets)
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli @capacitor/assets
          
          # 3. Buat folder dummy
          mkdir -p www
          echo "<html><body>Menyiapkan Laporan SPMB...</body></html>" > www/index.html
          
          # 4. Buat konfigurasi capacitor otomatis
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.laporanspmb.app",
            "appName": "Laporan SPMB 2026",
            "webDir": "www",
            "server": {
              "url": "https://dikbudkra.github.io/laporanspmb2026/",
              "cleartext": true
            }
          }
          EOF
          
          # 5. Tambahkan platform Android
          npx cap add android
          
          # 6. Pasang Ikon secara otomatis (perintah sakti)
          mkdir -p assets
          if [ -f "icon.png" ]; then
            cp icon.png assets/icon.png
            npx capacitor-assets generate --android
            
            # Hapus paksa folder adaptive icon bawaan agar Android dipaksa pakai ikon PNG kita
            rm -rf android/app/src/main/res/mipmap-anydpi-v26
          fi

      - name: Rakit APK dan Atasi Bentrok Kotlin
        run: |
          cd android
          
          # Obat penangkal error Duplicate Class Kotlin
          cat <<EOF >> app/build.gradle
          
          configurations.all {
              resolutionStrategy {
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              }
          }
          EOF
          
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Kirim File APK ke saya
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Laporan-SPMB-Siap-Pakai
          path: android/app/build/outputs/apk/debug/app-debug.apk
